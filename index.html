<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>IIUI Campus</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <!-- iOS Banner -->
  <div id="ios-banner"></div>

  <!-- Header -->
  <header id="app-header">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary-gold)" stroke-width="2">
      <path d="M12 21a9 9 0 1 1 6.36-2.64M15 11l2 2-2 2M18 13h-4"/>
      <polygon points="12 4 13.5 7 17 7 14 9 15 12.5 12 10.5 9 12.5 10 9 7 7 10.5 7" fill="var(--primary-gold)" stroke="none"/>
    </svg>
    <div class="header-titles">
      <div class="header-title">IIUI Campus</div>
      <div class="header-subtitle">Girls Campus · H-10</div>
    </div>
  </header>

  <!-- Content -->
  <main id="content">
    <div id="map-view" class="view active">
      <!-- SVG map generated by map.js -->
    </div>
    
    <div id="schedule-view" class="view">
      <div id="schedule-container"></div>
    </div>
    
    <div id="about-view" class="view" style="padding: 20px;">
      <div class="glass-card" style="text-align: center; margin-top: 40px;">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--primary-gold)" stroke-width="1.5">
          <path d="M12 21a9 9 0 1 1 6.36-2.64"/>
          <polygon points="12 4 13.5 7 17 7 14 9 15 12.5 12 10.5 9 12.5 10 9 7 7 10.5 7" fill="var(--primary-gold)" stroke="none"/>
        </svg>
        <h2 style="color: var(--primary-gold); margin: 15px 0 5px;">IIUI Campus</h2>
        <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 20px;">Version 1.0</p>
        <p style="margin-bottom: 15px; font-size: 0.95rem;">Built exclusively for IIUI Girls Campus · Department of Biological Sciences</p>
        <p style="color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 25px;">H-10, Islamabad, Pakistan</p>
        <div style="background: rgba(100, 255, 218, 0.1); padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 10px; text-align: left;">
          <svg width="24" height="24" stroke="var(--accent-green)" fill="none" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <span style="font-size: 0.85rem; color: var(--accent-green);">Your schedule never leaves your device. 100% private.</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Bottom Nav -->
  <nav id="app-nav">
    <div class="nav-tab active" data-target="map-view">
      <svg><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      Map
    </div>
    <div class="nav-tab" data-target="schedule-view">
      <svg><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Schedule
    </div>
    <div class="nav-tab" data-target="about-view">
      <svg><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      About
    </div>
  </nav>

  <!-- Bottom Sheet -->
  <div class="sheet-backdrop" id="sheet-backdrop"></div>
  <div id="bottom-sheet">
    <div class="drag-handle"></div>
    <div id="sheet-content"></div>
  </div>

  <script src="app.js"></script>
  <script src="map.js"></script>
  <script src="schedule.js"></script>
</body>
</html>
